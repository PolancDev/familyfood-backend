spring:
  application:
    name: familyfood-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/familyfood}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:F4m1lyF00d_2026!#}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '1'

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:familyfood-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000

logging:
  level:
    com.familyfood: DEBUG
    org.springframework.security: DEBUG